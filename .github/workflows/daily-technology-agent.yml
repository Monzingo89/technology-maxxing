name: Daily Technology Agent

on:
  schedule:
    # 17:00 UTC daily (adjust if you want a different timezone)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      forceTechnologyId:
        description: "Optional technology id to force for this run (example: angular)"
        required: false
        type: string
      dryRun:
        description: "Run without model/API call (safe test mode)"
        required: false
        default: true
        type: boolean
      model:
        description: "Override model name for this run"
        required: false
        default: "gpt-5.3-codex"
        type: string

permissions:
  contents: write

jobs:
  run-daily-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run daily technology agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.OPENAI_TECH_MAXXING_API_KEY }}
          FORCE_TECH_ID: ${{ github.event.inputs.forceTechnologyId || '' }}
          DAILY_AGENT_DRY_RUN: ${{ github.event.inputs.dryRun || 'false' }}
          DAILY_AGENT_MODEL: ${{ github.event.inputs.model || 'gpt-5.3-codex' }}
        run: node scripts/daily-agent.mjs

      - name: Commit generated updates
        if: ${{ github.event.inputs.dryRun != 'true' }}
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          TARGET_TECH=$(node -e "const fs=require('fs'); const p='.daily-agent/state.json'; if(!fs.existsSync(p)){process.exit(0)}; const s=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(s.lastProcessedTechId || 'unknown-tech')")

          git add data/ .daily-agent/ index.html
          git commit -m "chore(agent): daily technology expansion for ${TARGET_TECH}"
          git push
